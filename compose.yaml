services:
  backend:
    build:
      context: .
    container_name: profit-app-backend
    restart: unless-stopped
    ports:
      - "8021:8000"
    environment:
      PORT: "8000"
      PROFIT_APP_STORAGE_DIR: /data
      PROFIT_APP_DATABASE_PATH: /data/profit_app.sqlite3
    volumes:
      - ./storage:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json,sys,urllib.request; response=urllib.request.urlopen('http://127.0.0.1:8000/health'); payload=json.load(response); sys.exit(0 if payload.get('status') == 'ok' else 1)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
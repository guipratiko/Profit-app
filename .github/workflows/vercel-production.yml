name: Deploy Frontend to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - frontend/**
      - .github/workflows/vercel-production.yml

jobs:
  deploy:
    name: Vercel production deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      BACKEND_API_BASE_URL: ${{ secrets.BACKEND_API_BASE_URL || secrets.NEXT_PUBLIC_API_BASE_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: vercel-secrets
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$NEXT_PUBLIC_API_BASE_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Vercel deployment skipped: configure VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID, and NEXT_PUBLIC_API_BASE_URL repository secrets."
          fi

      - name: Set up Node
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npm ci

      - name: Pull Vercel project settings
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npx --yes vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifact
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npx --yes vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production artifact
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npx --yes vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
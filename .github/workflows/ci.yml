name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend-smoke:
    name: Backend smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.runtime.txt

      - name: Compile backend
        run: python -m compileall app

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8021
      BACKEND_API_BASE_URL: http://127.0.0.1:8021
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build